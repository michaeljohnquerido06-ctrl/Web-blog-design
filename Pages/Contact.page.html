<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Main</title>
</head>
<body>
    <main>
        <div class="container-fluid p-0 position-fixed top-0 start-0 end-0 bg-white shadow-sm" style="z-index: 1030;">
            <div class="row g-0 justify-content-center logback py-2">
                <div class="col-auto text-center Logo">
                    <img src="Picture/Nissan-Logo-1978-1988.png" alt="BookFace_logo" style="height: 50px;">
                </div>
            </div>

            <div class="row g-0 justify-content-center mb-2">
                <div class="col text-center">
                    <a href="Main.page.html"><button class="btn rounded-0 py-3 w-100 border border-1 border-dark Button1">Home</button></a>
                </div>
                <div class="col text-center">
                    <a href="About.page.html"><button class="btn rounded-0 py-3 w-100 border border-1 border-dark Button1">About</button></a>
                </div>
                <div class="col text-center">
                    <a href="Contact.page.html"><button class="btn rounded-0 py-3 w-100 border border-1 border-dark Button1-Active">Contact</button></a>
                </div>
            </div>
        </div>

        <div class="container" style="margin-top: 140px;">
            <div class="row justify-content-center">
                <div class="col-md-8">

                    <div class="card mb-4 shadow-lg border-0" style="border-radius: 10px; background-color: #f8f9fa;">
                        
                        <div class="card-header text-center bg-white border-0" style="border-bottom: 1px solid #dee2e6;">
                            <img src="Picture/Nissan-Logo-1978-1988.png" alt="Nissan Logo" style="height: 80px;">
                        </div>

                        <div class="card-body">

                            <h1 class="text-center mb-4" style="font-weight: 700; color: #2c3e50;">Contact Us</h1>

                            <div class="mb-4 border p-4 rounded" style="background-color: #f0f2f5;">
                                <h5 class="mb-3">Contact Information</h5>
                                <p><strong>Email:</strong> info@nissangtrblog.com</p>
                                <p><strong>Phone:</strong> +63 912 345 6789</p>
                                <p><strong>Address:</strong> 123 Speed Street, Tokyo, Japan</p>
                            </div>

                            <div class="border p-4 rounded" style="background-color: #f0f2f5;">
                                <h5 class="mb-3">Send us a message</h5>
                                <form>
                                    <div class="mb-3">
                                        <label for="name" class="form-label">Name:</label>
                                        <input type="text" class="form-control" id="name" placeholder="Your name">
                                    </div>
                                    <div class="mb-3">
                                        <label for="email" class="form-label">Email:</label>
                                        <input type="email" class="form-control" id="email" placeholder="Your email">
                                    </div>
                                    <div class="mb-3">
                                        <label for="message" class="form-label">Message:</label>
                                        <textarea class="form-control" id="message" rows="4" placeholder="Write your message here"></textarea>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100">Send</button>
                                </form>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
